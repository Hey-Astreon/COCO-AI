appId: com.cocoai.copilot
productName: Coco AI
directories:
  output: dist
files:
  - "**/*"
  - ".env"
  - "!Coco ai Pics"
  - "!dist"
  - "!.git"
  - "!.gitignore"
  - "!package-lock.json"
win:
  icon: Coco ai.ico
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  installerIcon: Coco ai.ico
  uninstallerIcon: Coco ai.ico
  uninstallDisplayName: Coco AI
