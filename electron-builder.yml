appId: com.cocoai.copilot
productName: Coco AI
artifactName: "CocoAI_Setup_${version}.${ext}"
directories:
  output: dist
files:
  - "**/*"
  - ".env"
  - "!Coco ai Pics"
  - "!dist"
  - "!.git"
  - "!.gitignore"
  - "!package-lock.json"
win:
  icon: Coco ai.ico
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  installerIcon: Coco ai.ico
  uninstallerIcon: Coco ai.ico
  uninstallDisplayName: Coco AI

# ─── Auto-Update via GitHub Releases ───
publish:
  provider: github
  owner: Hey-Astreon
  repo: COCO-AI
  releaseType: release
